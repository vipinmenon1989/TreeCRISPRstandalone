name: TreeCRISPR
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core scientific stack
  - numpy=2.2.6
  - pandas=2.2.3
  - scikit-learn=1.6.1
  - xgboost=2.1.2
  - joblib
  # Bioinformatics
  - biopython=1.85
  - pybigwig=0.3.24
  - viennarna=2.7.0         # provides RNAfold (used for MFE features)
  # Visualisation
  - matplotlib
  - scipy
  # Utilities
  - pip:
    - pyBigWig                # fallback pip install if conda pybigwig fails
